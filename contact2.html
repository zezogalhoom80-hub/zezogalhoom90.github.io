<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | CarZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style99.css">
</head>
<body>
     <header>
        <div class="left">
           <p class="logo-name"><strong>CarZone</strong></p>
          <nav>
            <div class="links">
              <a href="index.html"><strong>Home</strong></a>
            <a href="cars.html">Cars</a>
            <a href="book.html">Book</a>
            <a href="Search.html">Search</a>
            <a href="feedback (1).html">Feedback</a>
            <a href="contact2.html">Contact</a>
            </div>
          </nav>
        </div>
        <div class="right">
           <button onclick="toggleTheme()">Switch Mode</button>
        </div>
      </header>
   
<section class="carzone-contact-section">
    <div class="contact-card-wrapper">
    
        <div class="contact-sidebar">
            <div class="cz-logo">CAR<span>ZONE</span></div>
            <h2 class="cz-title">Get in Touch</h2>
            <p class="cz-description">Have questions about a specific model or need a service appointment? Our team is ready to help you.</p>
            
            <div class="cz-info-list">
                <div class="cz-info-item">
                    <span class="cz-icon">📍</span>
                    <div class="cz-details">
                        <strong>Location</strong>
                        <span>6 october, Giza, Egypt</span>
                    </div>
                </div>
                <div class="cz-info-item">
                    <span class="cz-icon">📞</span>
                    <div class="cz-details">
                        <strong>Call Us</strong>
                        <span>+20 1018585945</span>
                    </div>
                </div>
                <div class="cz-info-item">
                    <span class="cz-icon">✉️</span>
                    <div class="cz-details">
                        <strong>Email</strong>
                        <span>support@carzone.com</span>
                    </div>
                </div>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3455.9628045610816!2d31.2584144!3d29.9718712!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1458385472199b9d%3A0x63da1807d8b375!2sHelwan%20University!5e0!3m2!1sen!2seg!4v1714845000000!5m2!1sen!2seg"
                 width="100%" height="150px">Youtupe</iframe>
            </div>
        </div>

        <div class="contact-main-form">
            <h2 class="cz-title">Send a Message</h2>
            <form>
                <div class="cz-form-row">
                    <div class="cz-form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="cz-form-group">
                        <label>Phone Number</label>
                        <input type="tel" placeholder="+20 1xx xxx xxxx" required>
                    </div>
                </div>
                <div class="cz-form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="cz-form-group">
                    <label>Interested Car</label>
                    <input type="text" placeholder="Car Type">
                </div>
                <div class="cz-form-group">
                    <label>How can we help?</label>
                    <textarea rows="4" placeholder="Write your message here..."></textarea>
                </div>
                <button type="submit" class="cz-submit-btn">Send Message</button>
            </form>
        </div>
    </div>
</section>
<script src="script.js"></script>
</body>
</html>
