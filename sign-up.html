<!DOCTYPE html>
<html>
    <head>
 <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="logo.png">
  <title>Sign Up</title>
    </head>
    <body>
         <header>
        <div class="left">
           <p class="logo-name"><strong>CarZone</strong></p>
          <nav>
            <div class="links">
              <a href="index.html"><strong>Home</strong></a>
            <a href="cars.html">Cars</a>
            <a href="#">Book</a>
            <a href="#">Search</a>
            <a href="#">Feedback</a>
            <a href="#">Contact</a>
            </div>
          </nav>
        </div>
        <div class="right">
           <button onclick="toggleTheme()">Switch Mode</button>
        </div>
      </header>
      <hr>
      <div class="main-third">
        <h3>Create New Account</h3>
        <div class="input-2sign">
            <label>First Name</label>
            <input type="text" placeholder="Enter Your First Name">
            <label>Last Name</label>
            <input type="text" placeholder="Enter Your Last Name">
            <label>Email</label>
            <input type="email" placeholder="Enter Your Email">
             <div class="input-group">
                <label>Password</label>
            <input type="password" id="myinput" placeholder="Enter Your Password" required>
            <button type="button" onclick="showpass()" class="show-button"><strong>Show</strong></button>
            </div>
             <button class="login-2button">Log In</button>
        </div>
      </div>
